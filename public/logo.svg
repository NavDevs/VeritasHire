<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5D7052;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A9468;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#leafGradient)" />
  
  <!-- Leaf shape (truth/verification symbol) -->
  <path 
    d="M 50 20 
       C 50 20, 70 35, 70 50 
       C 70 65, 50 80, 50 80 
       C 50 80, 30 65, 30 50 
       C 30 35, 50 20, 50 20 Z" 
    fill="#FDFCF8" 
    opacity="0.95"
  />
  
  <!-- Checkmark inside leaf -->
  <path 
    d="M 40 50 L 47 57 L 62 42" 
    stroke="#5D7052" 
    stroke-width="4" 
    fill="none" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Small accent dots -->
  <circle cx="50" cy="15" r="2" fill="#FDFCF8" opacity="0.6" />
  <circle cx="85" cy="50" r="2" fill="#FDFCF8" opacity="0.6" />
  <circle cx="50" cy="85" r="2" fill="#FDFCF8" opacity="0.6" />
  <circle cx="15" cy="50" r="2" fill="#FDFCF8" opacity="0.6" />
</svg>
