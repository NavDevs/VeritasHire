name: Deploy to GitHub Pages (DISABLED - Use Vercel Instead)

# NOTE: This workflow is disabled because the app uses API routes
# that require server-side rendering, which GitHub Pages doesn't support.
# The app should be deployed to Vercel using the ci-cd.yml workflow.

on:
  workflow_dispatch: # Manual trigger only - disabled on push

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip deployment
        run: |
          echo "GitHub Pages deployment is disabled."
          echo "This app requires server-side API routes that GitHub Pages doesn't support."
          echo "Please use Vercel deployment instead."
          exit 1
